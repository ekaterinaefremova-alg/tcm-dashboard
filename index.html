<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TCM Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e0e0e0;padding:20px;min-height:100vh}
h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#fff}
.subtitle{font-size:13px;color:#666;margin-bottom:24px}
.btn{padding:6px 14px;font-size:12px;border-radius:8px;border:1px solid #333;background:#1a1d27;color:#ccc;cursor:pointer}
.btn:hover{background:#252833}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#34a853}
.status-text{font-size:12px;color:#888}
.total-section{background:linear-gradient(135deg,#1a1d27,#252833);border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid #2a2d3a}
.total-number{font-size:56px;font-weight:800;color:#fff;line-height:1}
.total-label{font-size:14px;color:#888;margin-top:4px;margin-bottom:16px}
.total-statuses{display:flex;gap:16px;flex-wrap:wrap}
.total-stat{background:#1a1d27;border-radius:12px;padding:12px 20px;border:1px solid #2a2d3a;min-width:120px}
.total-stat .num{font-size:24px;font-weight:700}
.total-stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.teams{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px}
.team-card{background:#1a1d27;border-radius:16px;padding:20px;border:1px solid #2a2d3a;transition:transform 0.2s}
.team-card:hover{transform:translateY(-2px)}
.team-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.team-total{font-size:36px;font-weight:800;color:#fff;margin-bottom:12px}
.team-total-label{font-size:11px;color:#666;margin-bottom:12px}
.status-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2230}
.status-row:last-child{border:none}
.status-name{font-size:13px;display:flex;align-items:center;gap:8px}
.status-badge{width:10px;height:10px;border-radius:3px}
.status-count{font-size:16px;font-weight:700}
.progress-wrap{margin-top:12px}
.progress-bar{height:8px;border-radius:4px;background:#0f1117;overflow:hidden;display:flex}
.progress-seg{height:100%;transition:width 0.5s}
.loading{text-align:center;padding:80px 20px}
.spinner{font-size:36px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.error-box{background:#2a1515;border:1px solid #5a2020;border-radius:12px;padding:20px;margin:20px 0}
@media(max-width:700px){.teams{grid-template-columns:1fr}}

/* Login screen */
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:80vh}
.login-box{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-box h2{font-size:20px;color:#fff;margin-bottom:8px}
.login-box p{font-size:13px;color:#666;margin-bottom:24px}
.login-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #333;background:#0f1117;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
.login-input:focus{border-color:#4285f4}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#4285f4;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#3275e4}
.login-error{color:#ea4335;font-size:13px;margin-top:8px;display:none}
</style>
</head>
<body>

<div id="login">
<div class="login-wrap">
<div class="login-box">
<h2>🔒 TCM Dashboard</h2>
<p>Введите пароль для доступа</p>
<input type="password" class="login-input" id="passInput" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkPass()">
<button class="login-btn" onclick="checkPass()">Войти</button>
<div class="login-error" id="loginError">Неверный пароль</div>
</div>
</div>
</div>

<div id="app" style="display:none">
<div class="loading"><div class="spinner">⏳</div>
<div style="font-size:18px;font-weight:600;color:#888;margin-top:12px">Загрузка данных...</div></div>
</div>

<script>
var PASS="tcmlatam2026";
var API_KEY="AIzaSyCnzz6tG4bJCCyRuQ5oTddeDEpDg-PShko";
var SPREADSHEET_ID="1gp8zaHuu_ctZeJnSpehLDaoYpDzzY5MvvmPdp9sp3Mk";

function checkPass(){
  var input=document.getElementById("passInput").value;
  if(input===PASS){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    fetchData();
    setInterval(fetchData,60000);
  }else{
    document.getElementById("loginError").style.display="block";
    document.getElementById("passInput").value="";
  }
}

var TEAMS=[
  {name:"Florencia",startRow:2,endRow:24},
  {name:"Misael",startRow:28,endRow:55},
  {name:"Belen",startRow:59,endRow:86}
];

var VALID_STATUSES=["Working","Test Period","Probation","On-boarding"];

var STATUS_COLORS={
  "Working":"#34a853",
  "Test Period":"#b39ddb",
  "Probation":"#fbbc04",
  "On-boarding":"#4fc3f7"
};

var lastUpdate=null;
var cachedData=null;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function matchStatus(status){
  var s=status.toLowerCase();
  if(s.indexOf("exit")>=0)return"";
  if(s.indexOf("work")>=0)return"Working";
  if(s.indexOf("test")>=0)return"Test Period";
  if(s.indexOf("prob")>=0)return"Probation";
  if(s.indexOf("on-bo")>=0||s.indexOf("onbo")>=0)return"On-boarding";
  return"";
}

function parseTeam(rows,startRow,endRow){
  var result={total:0,statuses:{}};
  VALID_STATUSES.forEach(function(s){result.statuses[s]=0});
  for(var i=startRow-1;i<endRow&&i<rows.length;i++){
    var row=rows[i]||[];
    var name=String(row[2]||"").trim();
    var status=String(row[3]||"").trim();
    if(!name)continue;
    var matched=matchStatus(status);
    if(!matched)continue;
    result.total++;
    result.statuses[matched]++;
  }
  return result;
}

function fetchData(){
  var url="https://sheets.googleapis.com/v4/spreadsheets/"+SPREADSHEET_ID+"/values/Employee%20list?key="+API_KEY;
  fetch(url).then(function(res){
    if(!res.ok)return res.json().then(function(e){throw new Error(e&&e.error?e.error.message:"HTTP "+res.status)});
    return res.json();
  }).then(function(json){
    cachedData=json.values||[];
    lastUpdate=new Date();
    render();
  }).catch(function(e){
    document.getElementById("app").innerHTML='<div class="error-box"><div style="font-size:18px;margin-bottom:8px">❌ Ошибка загрузки</div><div style="color:#f88">'+esc(e.message)+'</div><button class="btn" onclick="fetchData()" style="margin-top:12px">Попробовать снова</button></div>';
  });
}

function render(){
  if(!cachedData){fetchData();return}
  var rows=cachedData;
  var teams=[];
  var grandTotal=0;
  var grandStatuses={};
  VALID_STATUSES.forEach(function(s){grandStatuses[s]=0});

  TEAMS.forEach(function(t){
    var parsed=parseTeam(rows,t.startRow,t.endRow);
    teams.push({name:t.name,total:parsed.total,statuses:parsed.statuses});
    grandTotal+=parsed.total;
    VALID_STATUSES.forEach(function(s){grandStatuses[s]+=parsed.statuses[s]});
  });

  var html="";

  html+='<div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;margin-bottom:20px">';
  html+='<div><h1>📊 TCM Dashboard</h1><div class="subtitle">Команды TCM · Данные в реальном времени</div></div>';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  if(lastUpdate){
    html+='<div class="status-dot"></div>';
    html+='<span class="status-text">Обновлено: '+lastUpdate.toLocaleTimeString("ru-RU")+'</span>';
  }
  html+='<button class="btn" onclick="fetchData()">🔄 Обновить</button>';
  html+='</div></div>';

  html+='<div class="total-section">';
  html+='<div class="total-number">'+grandTotal+'</div>';
  html+='<div class="total-label">Всего сотрудников TCM</div>';
  html+='<div class="total-statuses">';
  VALID_STATUSES.forEach(function(s){
    html+='<div class="total-stat"><div class="num" style="color:'+STATUS_COLORS[s]+'">'+grandStatuses[s]+'</div><div class="lbl">'+s+'</div></div>';
  });
  html+='</div>';
  if(grandTotal>0){
    html+='<div class="progress-wrap"><div class="progress-bar">';
    VALID_STATUSES.forEach(function(s){
      var pct=grandStatuses[s]/grandTotal*100;
      if(pct>0)html+='<div class="progress-seg" style="width:'+pct+'%;background:'+STATUS_COLORS[s]+'"></div>';
    });
    html+='</div></div>';
  }
  html+='</div>';

  html+='<div class="teams">';
  teams.forEach(function(team){
    html+='<div class="team-card">';
    html+='<div class="team-name">'+esc(team.name)+'</div>';
    html+='<div class="team-total">'+team.total+'</div>';
    html+='<div class="team-total-label">сотрудников</div>';
    VALID_STATUSES.forEach(function(s){
      if(team.statuses[s]>0){
        html+='<div class="status-row">';
        html+='<div class="status-name"><div class="status-badge" style="background:'+STATUS_COLORS[s]+'"></div>'+s+'</div>';
        html+='<div class="status-count" style="color:'+STATUS_COLORS[s]+'">'+team.statuses[s]+'</div>';
        html+='</div>';
      }
    });
    if(team.total>0){
      html+='<div class="progress-wrap"><div class="progress-bar">';
      VALID_STATUSES.forEach(function(s){
        var pct=team.statuses[s]/team.total*100;
        if(pct>0)html+='<div class="progress-seg" style="width:'+pct+'%;background:'+STATUS_COLORS[s]+'"></div>';
      });
      html+='</div></div>';
    }
    html+='</div>';
  });
  html+='</div>';

  html+='<div style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:8px">';
  VALID_STATUSES.forEach(function(s){
    html+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888"><div style="width:10px;height:10px;border-radius:3px;background:'+STATUS_COLORS[s]+'"></div>'+s+'</div>';
  });
  html+='</div>';

  document.getElementById("app").innerHTML=html;
}
</script>
</body>
</html>

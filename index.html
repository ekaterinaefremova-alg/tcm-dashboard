<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TCM Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#0f1117;color:#e0e0e0;padding:20px;min-height:100vh}
h1{font-size:24px;font-weight:700;margin-bottom:4px;color:#fff}
.subtitle{font-size:13px;color:#666;margin-bottom:24px}
.btn{padding:6px 14px;font-size:12px;border-radius:8px;border:1px solid #333;background:#1a1d27;color:#ccc;cursor:pointer}
.btn:hover{background:#252833}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#34a853}
.status-text{font-size:12px;color:#888}
.section{background:linear-gradient(135deg,#1a1d27,#252833);border-radius:16px;padding:24px;margin-bottom:24px;border:1px solid #2a2d3a}
.section-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:16px}
.section-sub{font-size:13px;color:#888;margin-bottom:20px}
.total-number{font-size:56px;font-weight:800;color:#fff;line-height:1}
.total-label{font-size:14px;color:#888;margin-top:4px;margin-bottom:16px}
.total-statuses{display:flex;gap:16px;flex-wrap:wrap}
.total-stat{background:#1a1d27;border-radius:12px;padding:12px 20px;border:1px solid #2a2d3a;min-width:120px}
.total-stat .num{font-size:24px;font-weight:700}
.total-stat .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
.card{background:#1a1d27;border-radius:16px;padding:20px;border:1px solid #2a2d3a;transition:transform 0.2s}
.card:hover{transform:translateY(-2px)}
.team-name{font-size:16px;font-weight:700;color:#fff;margin-bottom:4px}
.team-total{font-size:36px;font-weight:800;color:#fff;margin-bottom:12px}
.team-total-label{font-size:11px;color:#666;margin-bottom:12px}
.status-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1f2230}
.status-row:last-child{border:none}
.status-name{font-size:13px;display:flex;align-items:center;gap:8px}
.status-badge{width:10px;height:10px;border-radius:3px}
.status-count{font-size:16px;font-weight:700}
.progress-wrap{margin-top:12px}
.progress-bar{height:8px;border-radius:4px;background:#0f1117;overflow:hidden;display:flex}
.progress-seg{height:100%;transition:width 0.5s}
.loading{text-align:center;padding:80px 20px}
.spinner{font-size:36px;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.error-box{background:#2a1515;border:1px solid #5a2020;border-radius:12px;padding:20px;margin:20px 0}
@media(max-width:700px){.grid3{grid-template-columns:1fr}}
.login-wrap{display:flex;justify-content:center;align-items:center;min-height:80vh}
.login-box{background:#1a1d27;border:1px solid #2a2d3a;border-radius:16px;padding:40px;width:100%;max-width:380px;text-align:center}
.login-box h2{font-size:20px;color:#fff;margin-bottom:8px}
.login-box p{font-size:13px;color:#666;margin-bottom:24px}
.login-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid #333;background:#0f1117;color:#fff;font-size:14px;outline:none;margin-bottom:12px}
.login-input:focus{border-color:#4285f4}
.login-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#4285f4;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.login-btn:hover{background:#3275e4}
.login-error{color:#ea4335;font-size:13px;margin-top:8px;display:none}
.slot-ring-bg{fill:none;stroke:#1f2230;stroke-width:8}
.slot-ring-fill{fill:none;stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset 0.8s ease}
.legend{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.pf-card{background:#0f1117;border-radius:14px;padding:20px;text-align:center}
.pf-name{font-size:14px;font-weight:600;color:#fff;margin-bottom:12px}
.pf-nums{display:flex;justify-content:center;align-items:baseline;gap:6px;margin-bottom:8px}
.pf-fact{font-size:36px;font-weight:800}
.pf-plan{font-size:18px;color:#666}
.pf-bar-bg{height:10px;border-radius:5px;background:#1f2230;overflow:hidden;margin-top:10px}
.pf-bar-fill{height:100%;border-radius:5px;transition:width 0.6s}
.pf-total-card{background:#0f1117;border-radius:14px;padding:20px;margin-bottom:16px}
.pf-total-nums{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.pf-total-big{font-size:32px;font-weight:800}
.pf-pct{font-size:28px;font-weight:800}
</style>
</head>
<body>
<div id="login">
<div class="login-wrap">
<div class="login-box">
<h2>&#128274; TCM Dashboard</h2>
<p>Введите пароль для доступа</p>
<input type="password" class="login-input" id="passInput" placeholder="Пароль" onkeydown="if(event.key==='Enter')checkPass()">
<button class="login-btn" onclick="checkPass()">Войти</button>
<div class="login-error" id="loginError">Неверный пароль</div>
</div>
</div>
</div>
<div id="app" style="display:none">
<div class="loading"><div class="spinner">&#9203;</div>
<div style="font-size:18px;font-weight:600;color:#888;margin-top:12px">Загрузка данных...</div></div>
</div>
<script>
var PASS="tcmlatam2026";
var API_KEY="AIzaSyCnzz6tG4bJCCyRuQ5oTddeDEpDg-PShko";
var SPREADSHEET_ID="1gp8zaHuu_ctZeJnSpehLDaoYpDzzY5MvvmPdp9sp3Mk";
var TEAM_NAMES=["Florencia","Misael","Belen"];
var VALID_STATUSES=["Working","Test Period","Probation","On-boarding"];
var FACT_STATUSES=["Working","Test Period"];
var STATUS_COLORS={"Working":"#34a853","Test Period":"#b39ddb","Probation":"#fbbc04","On-boarding":"#4fc3f7"};

function checkPass(){
var input=document.getElementById("passInput").value;
if(input===PASS){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
fetchData();
setInterval(fetchData,60000);
}else{
document.getElementById("loginError").style.display="block";
document.getElementById("passInput").value="";
}
}

var lastUpdate=null;
var cachedData=null;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}

function matchStatus(status){
var s=status.toLowerCase();
if(s.indexOf("exit")>=0)return "";
if(s.indexOf("work")>=0)return "Working";
if(s.indexOf("test")>=0)return "Test Period";
if(s.indexOf("prob")>=0)return "Probation";
if(s.indexOf("on")>=0&&s.indexOf("bo")>=0)return "On-boarding";
return "";
}

function findTeamBlocks(rows){
var headerRows=[];
for(var i=0;i<rows.length;i++){
var a=String(rows[i][0]||"").trim();
if(a==="\u2116"||a==="No"||a==="N\u00ba"||a==="\u2116"||a.toLowerCase()==="no"||a.toLowerCase()==="\u2116"){
headerRows.push(i);
}
}
var blocks=[];
for(var j=0;j<headerRows.length&&j<3;j++){
var start=headerRows[j]+1;
var end;
if(j+1<headerRows.length){
end=headerRows[j+1]-1;
}else{
end=rows.length-1;
for(var k=start;k<rows.length;k++){
var cellA=String(rows[k][0]||"").trim().toLowerCase();
if(cellA==="team lead"||cellA==="\u043f\u043b\u0430\u043d"){
end=k-1;
break;
}
}
}
blocks.push({name:TEAM_NAMES[j],start:start,end:end});
}
return blocks;
}

function parseTeamBlock(rows,start,end){
var result={total:0,fact:0,statuses:{}};
VALID_STATUSES.forEach(function(s){result.statuses[s]=0});
for(var i=start;i<=end&&i<rows.length;i++){
var row=rows[i]||[];
var name=String(row[2]||"").trim();
var status=String(row[3]||"").trim();
if(!name)continue;
var matched=matchStatus(status);
if(!matched)continue;
result.total++;
result.statuses[matched]++;
if(FACT_STATUSES.indexOf(matched)>=0)result.fact++;
}
return result;
}

function findSlots(rows){
var weekLabel="";
var slots=[];
for(var i=0;i<rows.length;i++){
var a=String(rows[i][0]||"").trim().toLowerCase();
if(a==="team lead"){
weekLabel=String(rows[i-1]?rows[i-1][0]||"":"").trim();
if(!weekLabel&&i>=2)weekLabel=String(rows[i-2]?rows[i-2][0]||"":"").trim();
for(var j=i+1;j<rows.length&&j<=i+5;j++){
var row=rows[j]||[];
var nm=String(row[0]||"").trim();
if(!nm)break;
var total=parseInt(String(row[1]||"0").replace(/[^0-9]/g,""))||0;
var filled=parseInt(String(row[2]||"0").replace(/[^0-9]/g,""))||0;
slots.push({name:nm,total:total,filled:filled});
}
break;
}
}
return {week:weekLabel,slots:slots};
}

function findPlan(rows){
var plans={total:0,Florencia:0,Misael:0,Belen:0};
for(var i=0;i<rows.length;i++){
var a=String(rows[i][0]||"").trim().toLowerCase();
if(a==="\u043f\u043b\u0430\u043d"){
for(var j=i+1;j<rows.length&&j<=i+5;j++){
var row=rows[j]||[];
var label=String(row[0]||"").trim().toLowerCase();
var val=parseInt(String(row[1]||"0").replace(/[^0-9]/g,""))||0;
if(label==="total")plans.total=val;
if(label==="florencia")plans.Florencia=val;
if(label==="misael")plans.Misael=val;
if(label.indexOf("bel")===0)plans.Belen=val;
}
break;
}
}
return plans;
}

function fetchData(){
var url="https://sheets.googleapis.com/v4/spreadsheets/"+SPREADSHEET_ID+"/values/Employee%20list?key="+API_KEY;
fetch(url).then(function(res){
if(!res.ok)return res.json().then(function(e){throw new Error(e&&e.error?e.error.message:"HTTP "+res.status)});
return res.json();
}).then(function(json){
cachedData=json.values||[];
lastUpdate=new Date();
render();
}).catch(function(e){
document.getElementById("app").innerHTML='<div class="error-box"><div style="font-size:18px;margin-bottom:8px">&#10060; Ошибка загрузки</div><div style="color:#f88">'+esc(e.message)+'</div><button class="btn" onclick="fetchData()" style="margin-top:12px">Попробовать снова</button></div>';
});
}

function getPfColor(pct){if(pct>=90)return "#34a853";if(pct>=70)return "#fbbc04";return "#ea4335";}
function getSlotColor(pct){if(pct>=80)return "#34a853";if(pct>=50)return "#fbbc04";return "#ea4335";}

function ringSvg(pct,color){
var r=42;var circ=2*Math.PI*r;var offset=circ-(pct/100)*circ;
return '<svg width="100" height="100" viewBox="0 0 100 100"><circle cx="50" cy="50" r="'+r+'" class="slot-ring-bg"/><circle cx="50" cy="50" r="'+r+'" class="slot-ring-fill" style="stroke:'+color+';stroke-dasharray:'+circ+';stroke-dashoffset:'+offset+'" transform="rotate(-90 50 50)"/></svg>';
}

function render(){
if(!cachedData){fetchData();return}
var rows=cachedData;
var blocks=findTeamBlocks(rows);
var teamData=[];
var grandTotal=0;var grandFact=0;
var grandStatuses={};
VALID_STATUSES.forEach(function(s){grandStatuses[s]=0});

blocks.forEach(function(b){
var parsed=parseTeamBlock(rows,b.start,b.end);
teamData.push({name:b.name,total:parsed.total,fact:parsed.fact,statuses:parsed.statuses});
grandTotal+=parsed.total;
grandFact+=parsed.fact;
VALID_STATUSES.forEach(function(s){grandStatuses[s]+=parsed.statuses[s]});
});

var plans=findPlan(rows);
var slotData=findSlots(rows);
var h="";

h+='<div style="display:flex;justify-content:space-between;align-items:start;flex-wrap:wrap;gap:8px;margin-bottom:20px">';
h+='<div><h1>&#128202; TCM Dashboard</h1><div class="subtitle">Команды TCM · Данные в реальном времени</div></div>';
h+='<div style="display:flex;align-items:center;gap:8px">';
if(lastUpdate){h+='<div class="status-dot"></div>';h+='<span class="status-text">Обновлено: '+lastUpdate.toLocaleTimeString("ru-RU")+'</span>';}
h+='<button class="btn" onclick="fetchData()">&#128260; Обновить</button>';
h+='</div></div>';

h+='<div class="section">';
h+='<div class="section-title">&#128203; Выполнение плана найма</div>';
var totalPlan=plans.total;
var totalFactPct=totalPlan>0?Math.round(grandFact/totalPlan*100):0;
var totalPfCol=getPfColor(totalFactPct);
h+='<div class="pf-total-card">';
h+='<div class="pf-total-nums"><div><span class="pf-total-big" style="color:'+totalPfCol+'">'+grandFact+'</span><span style="color:#666;font-size:18px"> / '+totalPlan+'</span></div>';
h+='<div class="pf-pct" style="color:'+totalPfCol+'">'+totalFactPct+'%</div></div>';
h+='<div style="font-size:13px;color:#888;margin-bottom:8px">Общий факт / план</div>';
h+='<div class="pf-bar-bg"><div class="pf-bar-fill" style="width:'+Math.min(totalFactPct,100)+'%;background:'+totalPfCol+'"></div></div>';
h+='</div>';
h+='<div class="grid3">';
teamData.forEach(function(team){
var plan=plans[team.name]||0;
var pct=plan>0?Math.round(team.fact/plan*100):0;
var col=getPfColor(pct);
h+='<div class="pf-card"><div class="pf-name">'+esc(team.name)+'</div>';
h+='<div class="pf-nums"><span class="pf-fact" style="color:'+col+'">'+team.fact+'</span><span class="pf-plan">/ '+plan+'</span></div>';
h+='<div style="font-size:20px;font-weight:700;color:'+col+'">'+pct+'%</div>';
h+='<div class="pf-bar-bg"><div class="pf-bar-fill" style="width:'+Math.min(pct,100)+'%;background:'+col+'"></div></div></div>';
});
h+='</div></div>';

h+='<div class="section">';
h+='<div class="total-number">'+grandTotal+'</div>';
h+='<div class="total-label">Всего сотрудников TCM</div>';
h+='<div class="total-statuses">';
VALID_STATUSES.forEach(function(s){h+='<div class="total-stat"><div class="num" style="color:'+STATUS_COLORS[s]+'">'+grandStatuses[s]+'</div><div class="lbl">'+s+'</div></div>';});
h+='</div>';
if(grandTotal>0){h+='<div class="progress-wrap"><div class="progress-bar">';
VALID_STATUSES.forEach(function(s){var pct=grandStatuses[s]/grandTotal*100;if(pct>0)h+='<div class="progress-seg" style="width:'+pct+'%;background:'+STATUS_COLORS[s]+'"></div>';});
h+='</div></div>';}
h+='</div>';

h+='<div class="grid3">';
teamData.forEach(function(team){
h+='<div class="card"><div class="team-name">'+esc(team.name)+'</div>';
h+='<div class="team-total">'+team.total+'</div><div class="team-total-label">сотрудников</div>';
VALID_STATUSES.forEach(function(s){if(team.statuses[s]>0){h+='<div class="status-row"><div class="status-name"><div class="status-badge" style="background:'+STATUS_COLORS[s]+'"></div>'+s+'</div><div class="status-count" style="color:'+STATUS_COLORS[s]+'">'+team.statuses[s]+'</div></div>';}});
if(team.total>0){h+='<div class="progress-wrap"><div class="progress-bar">';
VALID_STATUSES.forEach(function(s){var pct=team.statuses[s]/team.total*100;if(pct>0)h+='<div class="progress-seg" style="width:'+pct+'%;background:'+STATUS_COLORS[s]+'"></div>';});
h+='</div></div>';}
h+='</div>';
});
h+='</div>';

h+='<div class="legend">';
VALID_STATUSES.forEach(function(s){h+='<div style="display:flex;align-items:center;gap:6px;font-size:12px;color:#888"><div style="width:10px;height:10px;border-radius:3px;background:'+STATUS_COLORS[s]+'"></div>'+s+'</div>';});
h+='</div>';

h+='<div class="section">';
h+='<div class="section-title">&#127919; Слоты для ролевок</div>';
h+='<div class="section-sub">Текущая неделя: '+esc(slotData.week)+'</div>';
var totalSlots=0,totalFilled=0;
slotData.slots.forEach(function(s){totalSlots+=s.total;totalFilled+=s.filled});
var totalSlotPct=totalSlots>0?Math.round(totalFilled/totalSlots*100):0;
var totalSlotCol=getSlotColor(totalSlotPct);
h+='<div class="pf-total-card"><div class="pf-total-nums"><div><span class="pf-total-big" style="color:'+totalSlotCol+'">'+totalFilled+'</span><span style="color:#666;font-size:16px"> / '+totalSlots+'</span></div><div class="pf-pct" style="color:'+totalSlotCol+'">'+totalSlotPct+'%</div></div>';
h+='<div style="font-size:13px;color:#888;margin-bottom:8px">Общая заполняемость</div>';
h+='<div class="pf-bar-bg" style="height:10px"><div class="pf-bar-fill" style="width:'+totalSlotPct+'%;background:'+totalSlotCol+'"></div></div></div>';
h+='<div class="grid3" style="margin-top:16px">';
slotData.slots.forEach(function(s){
var pctNum=s.total>0?Math.round(s.filled/s.total*100):0;
var color=getSlotColor(pctNum);
h+='<div class="pf-card"><div class="pf-name">'+esc(s.name)+'</div>';
h+='<div style="position:relative;width:100px;height:100px;margin:0 auto 12px">'+ringSvg(pctNum,color)+'<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:800;color:'+color+'">'+pctNum+'%</div></div>';
h+='<div style="font-size:12px;color:#888">'+s.filled+' из '+s.total+' слотов</div></div>';
});
h+='</div></div>';

document.getElementById("app").innerHTML=h;
}
</script>
</body>
</html>
